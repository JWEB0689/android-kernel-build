name: Kernel Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu make git clang lld
        
    - name: Run build script
      run: |
        sudo mkdir -p /build
        sudo chown -R $USER:$USER /build
        chmod +x ./build.sh
        ./build.sh
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-images
        path: /build/out/Image*
        if-no-files-found: warn
