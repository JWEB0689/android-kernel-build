name: Kernel Builder Pro

permissions:
  contents: read

concurrency:
  group: kernel-builder-pro-${{ github.ref }}-${{ github.event.inputs.device || 'edgeplus' }}-${{ github.event.inputs.defconfig || 'vendor/edgeplus_defconfig' }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

on:
  workflow_dispatch:
    inputs:
      device:
        description: "Device codename (e.g. edgeplus)"
        required: true
        default: "edgeplus"
      defconfig:
        description: "Kernel defconfig"
        required: true
        default: "vendor/edgeplus_defconfig"
      arch:
        description: "Architecture"
        required: true
        default: "arm64"
      ksu_enabled:
        description: "Enable KernelSU integration"
        required: true
        default: "true"
      susfs_enabled:
        description: "Enable SUSFS integration"
        required: true
        default: "true"
  push:
    branches: [main, master]

env:
  KERNEL_DIR: ${{ github.workspace }}
  OUT_DIR: ${{ github.workspace }}/out
  PATCH_MANAGER_DIR: ${{ github.workspace }}/patch_manager
  ANYKERNEL_DIR: ${{ github.workspace }}/AnyKernel3
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CLANG_VERSION: "17"
  LLVM_DIR: "/usr/lib/llvm-17"
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3.git
  KSU_REPO: https://github.com/tiann/KernelSU.git
  SUSFS_REPO: https://github.com/ShirkNeko/susfs4ksu.git
  KBUILD_BUILD_USER: "kernelbuilder"
  KBUILD_BUILD_HOST: "github-actions"
  TZ: "UTC"

jobs:
  build:
    name: Build kernel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ github.ref }}-${{ github.event.inputs.arch || 'arm64' }}-${{ github.event.inputs.defconfig || 'vendor/edgeplus_defconfig' }}-${{ github.event.inputs.device || 'edgeplus' }}
          restore-keys: |
            ccache-${{ github.ref }}-${{ github.event.inputs.arch || 'arm64' }}-
            ccache-${{ github.ref }}-
            ccache-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            bc bison flex libssl-dev make \
            libc6-dev libncurses5-dev \
            ccache git wget curl \
            libelf-dev dwarves \
            python3 python3-pip \
            zip unzip
          sudo apt-get clean

      - name: Install LLVM/Clang
        run: |
          sudo apt-get install -y -qq --no-install-recommends \
            clang-${CLANG_VERSION} lld-${CLANG_VERSION} llvm-${CLANG_VERSION}
          echo "/usr/lib/llvm-${CLANG_VERSION}/bin" >> "$GITHUB_PATH"
          echo "LLVM_DIR=/usr/lib/llvm-${CLANG_VERSION}" >> "$GITHUB_ENV"

      - name: Prepare directories
        run: mkdir -p "${OUT_DIR}" "${PATCH_MANAGER_DIR}" "${ANYKERNEL_DIR}" "${CCACHE_DIR}"

      - name: Export build variables
        run: |
          echo "DEVICE=${{ github.event.inputs.device || 'edgeplus' }}" >> $GITHUB_ENV
          echo "DEFCONFIG=${{ github.event.inputs.defconfig || 'vendor/edgeplus_defconfig' }}" >> $GITHUB_ENV
          echo "ARCH=${{ github.event.inputs.arch || 'arm64' }}" >> $GITHUB_ENV
          echo "KSU_ENABLED=${{ github.event.inputs.ksu_enabled || 'true' }}" >> $GITHUB_ENV
          echo "SUSFS_ENABLED=${{ github.event.inputs.susfs_enabled || 'true' }}" >> $GITHUB_ENV
          echo "CCACHE_DIR=${{ env.CCACHE_DIR }}" >> $GITHUB_ENV
          echo "CC='ccache clang'" >> $GITHUB_ENV
          echo "CXX='ccache clang++'" >> $GITHUB_ENV

      - name: Show environment
        run: |
          echo "DEVICE=$DEVICE"
          echo "DEFCONFIG=$DEFCONFIG"
          echo "ARCH=$ARCH"
          echo "KSU_ENABLED=$KSU_ENABLED"
          echo "SUSFS_ENABLED=$SUSFS_ENABLED"
          clang --version || true
          ccache -s || true

      - name: Create patch manager skeleton
        run: |
          cat > "${PATCH_MANAGER_DIR}/patch_manager.py" << 'EOF'
          #!/usr/bin/env python3
          import os
          import subprocess
          from pathlib import Path

          KERNEL_DIR = Path(os.environ.get("KERNEL_DIR", ".")).resolve()
          PATCH_MANAGER_DIR = Path(os.environ.get("PATCH_MANAGER_DIR", "./patch_manager")).resolve()
          LOG_DIR = PATCH_MANAGER_DIR / "logs"
          LOG_DIR.mkdir(parents=True, exist_ok=True)

          GROUPS = ["base", "susfs", "kernelsu", "universal", "device"]

          def run(cmd, cwd=None):
            print(f"[patch-manager] $ {' '.join(cmd)}", flush=True)
            result = subprocess.run(cmd, cwd=cwd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)
            print(result.stdout)
            if result.returncode != 0:
              raise SystemExit(result.returncode)

          def detect_kernel_version():
            mk = KERNEL_DIR / "Makefile"
            version = "unknown"
            if mk.exists():
              major = minor = sub = extra = ""
              with mk.open() as f:
                for line in f:
                  if line.startswith("VERSION ="):
                    major = line.split("=")[1].strip()
                  elif line.startswith("PATCHLEVEL ="):
                    minor = line.split("=")[1].strip()
                  elif line.startswith("SUBLEVEL ="):
                    sub = line.split("=")[1].strip()
                  elif line.startswith("EXTRAVERSION ="):
                    extra = line.split("=")[1].strip()
              version = f"{major}.{minor}.{sub}{extra}"
            print(f"[patch-manager] Detected kernel version: {version}")
            return version

          def detect_kernelsu_layout():
            candidates = [
              "drivers/kernelsu",
              "kernel/kernelsu",
              "security/kernelsu",
              "kernel/security/kernelsu",
            ]
            for c in candidates:
              if (KERNEL_DIR / c).exists():
                print(f"[patch-manager] Detected KernelSU layout at: {c}")
                return c
            print("[patch-manager] KernelSU not detected")
            return None

          def susfs_supported(version: str) -> bool:
            try:
              major = int(version.split(".")[0])
            except Exception:
              return False
            return major >= 4

          def apply_patch_file(patch_path: Path):
            print(f"[patch-manager] Applying patch: {patch_path}")
            run(["bash", "-lc", f"patch -p1 --forward --ignore-whitespace < '{patch_path}'"], cwd=KERNEL_DIR)
            rejects = list(KERNEL_DIR.rglob("*.rej"))
            if rejects:
              print("[patch-manager] Patch rejected:")
              for r in rejects:
                print(f"  - {r}")
              raise SystemExit(1)

          def apply_group(group: str, ksu_layout: str | None, enable_susfs: bool):
            group_dir = PATCH_MANAGER_DIR / group
            if not group_dir.exists():
              print(f"[patch-manager] Group '{group}' not present, skipping")
              return
            print(f"[patch-manager] Applying group: {group}")
            patches = sorted(group_dir.rglob("*.patch"))
            for p in patches:
              if group == "kernelsu" and not ksu_layout:
                print("[patch-manager] KSU not detected, skipping kernelsu patch:", p)
                continue
              if group == "susfs" and not enable_susfs:
                print("[patch-manager] SUSFS disabled or unsupported, skipping:", p)
                continue
              apply_patch_file(p)

          def main():
            version = detect_kernel_version()
            ksu_layout = detect_kernelsu_layout()
            enable_susfs = os.environ.get("SUSFS_ENABLED", "false").lower() == "true" and susfs_supported(version)

            print(f"[patch-manager] SUSFS enabled flag: {enable_susfs}")
            print(f"[patch-manager] KSU layout: {ksu_layout}")

            for group in GROUPS:
              apply_group(group, ksu_layout, enable_susfs)

            print("[patch-manager] All patch groups processed successfully")

          if __name__ == "__main__":
            main()
          EOF
          chmod +x "${PATCH_MANAGER_DIR}/patch_manager.py"

      - name: Run patch manager
        env:
          KERNEL_DIR: ${{ env.KERNEL_DIR }}
          PATCH_MANAGER_DIR: ${{ env.PATCH_MANAGER_DIR }}
          SUSFS_ENABLED: ${{ env.SUSFS_ENABLED }}
        run: python3 "${PATCH_MANAGER_DIR}/patch_manager.py"

      - name: Configure kernel
        env:
          ARCH: ${{ env.ARCH }}
          SUBARCH: ${{ env.ARCH }}
          KERNEL_DIR: ${{ env.KERNEL_DIR }}
          OUT_DIR: ${{ env.OUT_DIR }}
          DEFCONFIG: ${{ env.DEFCONFIG }}
        run: |
          cd "${KERNEL_DIR}"
          export ARCH SUBARCH KBUILD_OUTPUT="${OUT_DIR}"
          # Guard defconfig presence
          if [ ! -f "${DEFCONFIG}" ] && [ ! -f "arch/${ARCH}/configs/${DEFCONFIG##*/}" ]; then
            echo "Defconfig not found: ${DEFCONFIG}" >&2
            exit 1
          fi
          make "${DEFCONFIG}"

      - name: Build kernel
        env:
          ARCH: ${{ env.ARCH }}
          SUBARCH: ${{ env.ARCH }}
          KERNEL_DIR: ${{ env.KERNEL_DIR }}
          OUT_DIR: ${{ env.OUT_DIR }}
          CCACHE_DIR: ${{ env.CCACHE_DIR }}
        run: |
          cd "${KERNEL_DIR}"
          export ARCH SUBARCH KBUILD_OUTPUT="${OUT_DIR}"
          export CC="ccache clang" CXX="ccache clang++"
          export LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
          ccache -z || true
          make -j"$(nproc --all)" O="${OUT_DIR}" CC="ccache clang" LD=ld.lld
          ccache -s || true

      - name: Collect kernel artifacts
        env:
          OUT_DIR: ${{ env.OUT_DIR }}
        run: |
          mkdir -p artifacts
          if [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz-dtb" ]; then
            cp "${OUT_DIR}/arch/arm64/boot/Image.gz-dtb" artifacts/
          elif [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz" ]; then
            cp "${OUT_DIR}/arch/arm64/boot/Image.gz" artifacts/
          fi
          if find "${OUT_DIR}" -name "*.ko" | grep -q .; then
            mkdir -p artifacts/modules
            find "${OUT_DIR}" -name "*.ko" -print0 | xargs -0 -I{} cp "{}" artifacts/modules/
          fi

      - name: Sync AnyKernel3
        env:
          ANYKERNEL_DIR: ${{ env.ANYKERNEL_DIR }}
          ANYKERNEL_REPO: ${{ env.ANYKERNEL_REPO }}
        run: |
          rm -rf "${ANYKERNEL_DIR}"
          git clone --depth=1 "${ANYKERNEL_REPO}" "${ANYKERNEL_DIR}"
          rm -rf "${ANYKERNEL_DIR}/.git"

      - name: Build AnyKernel3 ZIP
        env:
          ANYKERNEL_DIR: ${{ env.ANYKERNEL_DIR }}
          DEVICE: ${{ env.DEVICE }}
          OUT_DIR: ${{ env.OUT_DIR }}
        run: |
          cd "${ANYKERNEL_DIR}"
          mkdir -p kernel
          if [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz-dtb" ]; then
            cp "${OUT_DIR}/arch/arm64/boot/Image.gz-dtb" kernel/
          elif [ -f "${OUT_DIR}/arch/arm64/boot/Image.gz" ]; then
            cp "${OUT_DIR}/arch/arm64/boot/Image.gz" kernel/
          else
            echo "[AK3] ERROR: No kernel image found!" >&2
            exit 1
          fi
          if find "${OUT_DIR}" -name "*.ko" | grep -q .; then
            mkdir -p modules
            find "${OUT_DIR}" -name "*.ko" -print0 | xargs -0 -I{} cp "{}" modules/
          fi
          VERSION_FILE="${OUT_DIR}/include/config/kernel.release"
          KVER="unknown"
          [ -f "${VERSION_FILE}" ] && KVER="$(cat "${VERSION_FILE}")"
          DATE="$(date +%Y%m%d-%H%M)"
          ZIP_NAME="${DEVICE}-${KVER}-${DATE}.zip"
          zip -r "../${ZIP_NAME}" ./*
          echo "BUILT_ZIP=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-artifacts
          path: |
            artifacts
            ${{ env.ANYKERNEL_DIR }}/../${{ env.BUILT_ZIP || '' }}
          if-no-files-found: warn

      - name: Upload logs (best-effort)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            ${{ env.PATCH_MANAGER_DIR }}/logs
            ${{ env.OUT_DIR }}/.config
          if-no-files-found: ignore   
