name: Build User Kernel (Git)

permissions:
  contents: read
  actions: write

concurrency:
  group: kernel-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: "Kernel source git URL"
        type: string
        required: true
      kernel_branch:
        description: "Branch or tag to build"
        type: string
        required: true
      defconfig:
        description: "Defconfig name (relative to arch/arm64/configs/)"
        type: string
        required: true
      ksu_fork:
        description: "KernelSU fork to overlay"
        type: choice
        options:
          - Tiann
          - SukiSU
          - ReSukiSU
          - KernelSU-Next
          - WKSU
        default: Tiann
      add_susfs:
        description: "Add SUSFS support"
        type: boolean
        default: true
      add_kpm:
        description: "Add KPM support"
        type: boolean
        default: false
      kernel_image_name:
        description: "Output image name"
        type: string
        default: "Image"
      anykernel_branch:
        description: "AnyKernel3 branch"
        type: string
        default: "gki-2.0"
      extra_make_args:
        description: "Extra make arguments"
        type: string
        default: ""
      lto_mode:
        description: "LTO mode"
        type: choice
        options:
          - thin
          - full
          - none
        default: thin
      susfs_branch:
        description: "SUSFS branch override"
        type: string
        default: ""

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_COMPRESS: "true"
  CCACHE_MAXSIZE: "2G"

jobs:
  validate-inputs:
    name: Validate Workflow Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate Git URL
        run: |
          if ! [[ "${{ inputs.kernel_repo }}" =~ ^https?://.*\.git$ ]] && ! [[ "${{ inputs.kernel_repo }}" =~ ^git@.*:.*\.git$ ]]; then
            echo "::error::Invalid kernel repository URL format"
            exit 1
          fi
          echo "✓ Git URL format valid"

      - name: Validate Defconfig Name
        run: |
          if [[ ! "${{ inputs.defconfig }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid defconfig name format (must be alphanumeric with hyphens/underscores)"
            exit 1
          fi
          echo "✓ Defconfig name valid"

  build:
    name: User Kernel Build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: validate-inputs

    steps:
      - name: Checkout (for access to scripts)
        uses: actions/checkout@v4
        with:
          sparse-checkout: ".github"
          sparse-checkout-cone-mode: false

      - name: Start Build Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # Kernel Build Configuration
          | Setting | Value |
          |---------|-------|
          | Kernel Repo | ${{ inputs.kernel_repo }} |
          | Branch | ${{ inputs.kernel_branch }} |
          | Defconfig | ${{ inputs.defconfig }} |
          | KSU Fork | ${{ inputs.ksu_fork }} |
          | SUSFS Support | ${{ inputs.add_susfs }} |
          | KPM Support | ${{ inputs.add_kpm }} |
          | LTO Mode | ${{ inputs.lto_mode }} |
          EOF

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: kernel-build-${{ runner.os }}
          max-size: 2G
          verbose: 2

      - name: Install Build Toolchain
        run: |
          set -e
          echo "::group::Updating package manager"
          sudo apt-get update -qq
          echo "::endgroup::"
          
          echo "::group::Installing build dependencies"
          sudo apt-get install -y -qq \
            clang lld llvm gcc-aarch64-linux-gnu binutils \
            bc bison flex libssl-dev libelf-dev cpio kmod \
            python3 python-is-python3 ccache
          echo "::endgroup::"
          
          echo "::group::Verifying toolchain versions"
          clang --version | head -1
          aarch64-linux-gnu-gcc --version | head -1
          make --version | head -1
          echo "::endgroup::"

      - name: Clone Kernel Source
        env:
          REPO: ${{ inputs.kernel_repo }}
          BRANCH: ${{ inputs.kernel_branch }}
        run: |
          echo "::group::Cloning kernel repository"
          git clone --depth=1 --branch "$BRANCH" "$REPO" kernel_source
          cd kernel_source
          echo "Cloned $(git rev-parse --short HEAD) from $BRANCH"
          echo "::endgroup::"

      - name: Detect Kernel Version
        run: |
          cd kernel_source
          VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
          PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
          SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
          KERNEL_VER="${VERSION}.${PATCHLEVEL}"
          SUB="${SUBLEVEL:-0}"
          
          echo "KERNEL_VER=$KERNEL_VER" >> "$GITHUB_ENV"
          echo "SUBLEVEL=$SUB" >> "$GITHUB_ENV"
          echo "FULL_VERSION=${KERNEL_VER}.${SUB}" >> "$GITHUB_ENV"
          echo "FILE_NAME=${KERNEL_VER}.${SUB}-UserKernel" >> "$GITHUB_ENV"
          
          echo "Detected kernel version: ${KERNEL_VER}.${SUB}"

      - name: Resolve SUSFS Branch
        if: inputs.add_susfs == true
        env:
          OVERRIDE: ${{ inputs.susfs_branch }}
        run: |
          echo "::group::Resolving SUSFS branch"
          SUSFS_REPO="https://github.com/ShirkNeko/susfs4ksu.git"
          
          if [ -n "$OVERRIDE" ]; then
            echo "Using SUSFS branch override: $OVERRIDE"
            echo "SUSFS_BRANCH=$OVERRIDE" >> "$GITHUB_ENV"
            echo "::endgroup::"
            exit 0
          fi
          
          echo "Scanning for compatible SUSFS branch..."
          for AV in android16 android15 android14 android13 android12; do
            CANDIDATE="gki-${AV}-${KERNEL_VER}"
            echo "  Checking: $CANDIDATE"
            if git ls-remote --heads "$SUSFS_REPO" "$CANDIDATE" | grep -q .; then
              echo "✓ Found compatible branch: $CANDIDATE"
              echo "SUSFS_BRANCH=$CANDIDATE" >> "$GITHUB_ENV"
              echo "::endgroup::"
              exit 0
            fi
          done
          
          CANDIDATE="kernel-${KERNEL_VER}"
          echo "  Checking: $CANDIDATE"
          if git ls-remote --heads "$SUSFS_REPO" "$CANDIDATE" | grep -q .; then
            echo "✓ Found compatible branch: $CANDIDATE"
            echo "SUSFS_BRANCH=$CANDIDATE" >> "$GITHUB_ENV"
            echo "::endgroup::"
            exit 0
          fi
          
          echo "::error::Could not find compatible SUSFS branch"
          echo "::endgroup::"
          exit 1

      - name: Clone SUSFS Patches
        if: inputs.add_susfs == true
        run: |
          echo "::group::Cloning SUSFS patches"
          git clone --depth=1 --branch "$SUSFS_BRANCH" https://github.com/ShirkNeko/susfs4ksu.git susfs_patches
          echo "✓ SUSFS patches cloned from branch: $SUSFS_BRANCH"
          echo "::endgroup::"

      - name: Clone AnyKernel3
        env:
          AK_BRANCH: ${{ inputs.anykernel_branch }}
        run: |
          echo "::group::Cloning AnyKernel3"
          git clone --depth=1 --branch "$AK_BRANCH" https://github.com/WildKernels/AnyKernel3.git AnyKernel3
          rm -rf AnyKernel3/.git
          echo "✓ AnyKernel3 cloned from branch: $AK_BRANCH"
          echo "::endgroup::"

      - name: Clone KernelSU Base
        run: |
          echo "::group::Cloning KernelSU base"
          git clone --depth=1 https://github.com/tiann/KernelSU.git KSU_BASE
          echo "✓ KernelSU base cloned"
          echo "::endgroup::"

      - name: Apply SUSFS to Base
        if: inputs.add_susfs == true
        run: |
          echo "::group::Applying SUSFS patches"
          cd KSU_BASE
          PATCH=$(find "$GITHUB_WORKSPACE/susfs_patches/kernel_patches" -maxdepth 1 -name '50_add_susfs_in_*.patch' | head -1)
          
          if [ -z "$PATCH" ]; then
            echo "::warning::No SUSFS patch found, continuing without SUSFS"
            echo "::endgroup::"
            exit 0
          fi
          
          echo "Applying patch: $(basename "$PATCH")"
          if patch -p1 -F3 --no-backup-if-mismatch < "$PATCH"; then
            echo "✓ SUSFS patches applied successfully"
          else
            echo "::warning::SUSFS patch application had conflicts, continuing"
          fi
          echo "::endgroup::"

      - name: Clone Selected KernelSU Fork
        run: |
          echo "::group::Cloning KernelSU fork"
          case "${{ inputs.ksu_fork }}" in
            Tiann)
              echo "Using base Tiann KernelSU (no fork overlay)"
              ;;
            SukiSU)
              echo "Cloning SukiSU-Ultra fork..."
              git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git KSU_FORK
              ;;
            ReSukiSU)
              echo "Cloning ReSukiSU fork..."
              git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git KSU_FORK
              ;;
            KernelSU-Next)
              echo "Cloning KernelSU-Next fork..."
              git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KSU_FORK
              ;;
            WKSU)
              echo "Cloning Wild KSU fork..."
              git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git KSU_FORK
              ;;
            *)
              echo "::error::Unknown KSU fork: ${{ inputs.ksu_fork }}"
              exit 1
              ;;
          esac
          echo "✓ KernelSU fork ready"
          echo "::endgroup::"

      - name: Merge Fork Overlay
        run: |
          echo "::group::Merging fork overlay"
          if [ ! -d KSU_FORK ]; then
            echo "No fork overlay to merge (using base)"
            echo "::endgroup::"
            exit 0
          fi
          
          cd KSU_FORK
          DIRS_MERGED=0
          for DIR in core hook feature include manager policy; do
            if [ -d "$DIR" ]; then
              echo "Merging: $DIR"
              rsync -a --ignore-existing "$DIR/" "$GITHUB_WORKSPACE/KSU_BASE/$DIR/"
              ((DIRS_MERGED++))
            fi
          done
          
          echo "✓ Merged $DIRS_MERGED directories from fork"
          echo "::endgroup::"

      - name: Auto-Detect KSU Injection Path
        run: |
          echo "::group::Detecting KSU injection path"
          cd kernel_source
          
          if grep -Rqs "security/" .; then
            TARGET="security/KernelSU"
            echo "Detected: security/ directory exists"
          elif grep -Rqs "kernel/" .; then
            TARGET="kernel/KernelSU"
            echo "Detected: kernel/ directory exists"
          else
            TARGET="KernelSU"
            echo "Using fallback path"
          fi
          
          echo "KSU_TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "✓ KSU will be injected to: $TARGET"
          echo "::endgroup::"

      - name: Inject Merged KernelSU
        run: |
          echo "::group::Injecting KernelSU into kernel"
          mkdir -p "kernel_source/${KSU_TARGET}"
          rsync -a KSU_BASE/ "kernel_source/${KSU_TARGET}/"
          echo "✓ KernelSU injected to ${KSU_TARGET}"
          echo "::endgroup::"

      - name: Configure Defconfig
        working-directory: kernel_source
        env:
          ADD_SUSFS: ${{ inputs.add_susfs }}
          ADD_KPM: ${{ inputs.add_kpm }}
          DEFCONFIG_NAME: ${{ inputs.defconfig }}
        run: |
          echo "::group::Configuring kernel defconfig"
          DEFCONFIG_PATH="arch/arm64/configs/${DEFCONFIG_NAME}"
          
          if [ ! -f "$DEFCONFIG_PATH" ]; then
            echo "::error::Defconfig not found: $DEFCONFIG_PATH"
            exit 1
          fi
          
          echo "Appending kernel configuration options..."
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KALLSYMS=y"
            echo "CONFIG_KALLSYMS_ALL=y"
            if [ "$ADD_SUSFS" = "true" ]; then
              echo "CONFIG_KSU_SUSFS=y"
            fi
            if [ "$ADD_KPM" = "true" ]; then
              echo "CONFIG_KPM=y"
            fi
          } >> "$DEFCONFIG_PATH"
          
          echo "✓ Defconfig configured"
          echo "::endgroup::"

      - name: Build Kernel
        working-directory: kernel_source
        env:
          LTO_MODE: ${{ inputs.lto_mode }}
          EXTRA_ARGS: ${{ inputs.extra_make_args }}
          DEFCONFIG_NAME: ${{ inputs.defconfig }}
        run: |
          set -e
          echo "::group::Building kernel"
          
          LTO_FLAG=""
          [ "$LTO_MODE" != "none" ] && LTO_FLAG="LTO=$LTO_MODE"
          
          WARN_FLAGS="-Wno-error -Wno-implicit-int -Wno-strict-prototypes -Wno-implicit-function-declaration"
          MAKE_ARGS="O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CC=clang-14 $LTO_FLAG $EXTRA_ARGS"
          
          echo "Make arguments: $MAKE_ARGS"
          echo "LTO mode: ${LTO_MODE:-none}"
          
          echo "Running: make $MAKE_ARGS $DEFCONFIG_NAME"
          make $MAKE_ARGS "$DEFCONFIG_NAME"
          
          echo "Building kernel (using $(nproc --all) cores)..."
          make $MAKE_ARGS KCFLAGS="$WARN_FLAGS" -j$(nproc --all)
          
          echo "✓ Kernel build completed successfully"
          echo "::endgroup::"

      - name: Verify Build Artifacts
        run: |
          echo "::group::Verifying build artifacts"
          IMAGE_PATH="kernel_source/out/arch/arm64/boot/${{ inputs.kernel_image_name }}"
          
          if [ ! -f "$IMAGE_PATH" ]; then
            echo "::error::Kernel image not found: $IMAGE_PATH"
            exit 1
          fi
          
          SIZE=$(du -h "$IMAGE_PATH" | cut -f1)
          echo "✓ Kernel image found: $SIZE"
          
          DTB_COUNT=$(find kernel_source/out/arch/arm64/boot/dts -name "*.dtb" 2>/dev/null | wc -l)
          echo "✓ Found $DTB_COUNT device tree blobs"
          echo "::endgroup::"

      - name: Prepare AnyKernel3 Package
        env:
          IMAGE_NAME: ${{ inputs.kernel_image_name }}
        run: |
          echo "::group::Preparing AnyKernel3 package"
          IMAGE_PATH="kernel_source/out/arch/arm64/boot/${IMAGE_NAME}"
          
          cp "$IMAGE_PATH" AnyKernel3/
          mkdir -p AnyKernel3/dtbs
          find kernel_source/out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} AnyKernel3/dtbs/ \;
          
          DTB_COUNT=$(find AnyKernel3/dtbs -name "*.dtb" | wc -l)
          echo "✓ AnyKernel3 package prepared with $DTB_COUNT DTBs"
          echo "::endgroup::"

      - name: Create Build Info
        run: |
          cat > ./AnyKernel3/BUILD_INFO.txt << 'EOF'
          Build Information
          ==================
          Build Date: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Kernel Version: ${{ env.FULL_VERSION }}
          KernelSU Fork: ${{ inputs.ksu_fork }}
          SUSFS Support: ${{ inputs.add_susfs }}
          KPM Support: ${{ inputs.add_kpm }}
          LTO Mode: ${{ inputs.lto_mode }}
          Kernel Repo: ${{ inputs.kernel_repo }}
          Branch: ${{ inputs.kernel_branch }}
          Defconfig: ${{ inputs.defconfig }}
          EOF

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILE_NAME }}-AnyKernel3
          path: ./AnyKernel3/**
          compression-level: 9
          if-no-files-found: error
          retention-days: 30

      - name: Update Build Summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ Build Completed Successfully!
          
          **Output Artifact:** `${{ env.FILE_NAME }}-AnyKernel3`
          
          **Build Details:**
          - Kernel Version: `${{ env.FULL_VERSION }}`
          - KSU Fork: `${{ inputs.ksu_fork }}`
          - SUSFS: `${{ inputs.add_susfs }}`
          - KPM: `${{ inputs.add_kpm }}`
          - LTO: `${{ inputs.lto_mode }}`
          EOF

      - name: Update Build Summary (Failed)
        if: failure()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ❌ Build Failed
          
          Check the logs above for details.
          EOF
