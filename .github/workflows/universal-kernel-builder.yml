name: Universal Kernel Builder — rtwo

# ─────────────────────────────────────────────────────────────
#  Merges the best features from all four reference workflows:
#  • build.yml          → custom clang picker, ccache, swap, private-repo
#  • kernel-user-git    → KSU setup scripts, defconfig pruning, ABI bypass,
#                         dirty-suffix removal, reject scanner, Job Summary
#  • universal-builder  → KSU fork overlay, SUSFS auto-detect, KPM toggle
#  • Build Kernel OnePlus → KSU APK bundling, SUSFS module (CI/Release),
#                           BBR+ECN, KPM patch_linux binary patching,
#                           TMPFS_POSIX_ACL config
#
#  Extras:
#  • zeromount module (Enginex0/zeromount) bundled into AnyKernel3 ZIP
#  • NoMount kernel patch (maxsteeel/nomount) as alternative to plain SUSFS
#    — uses the combined nomount-susfs-kernel-5.15.patch for zero-mount
#      injection at the VFS layer (no /proc/mounts pollution)
#
#  Hard-coded defaults for: device=rtwo  kmi=android13-5.15
# ─────────────────────────────────────────────────────────────

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:

      # ── Kernel Source ──────────────────────────────────────
      kernel_repo:
        description: "Kernel source git URL"
        type: string
        required: true
      kernel_branch:
        description: "Branch / tag to build"
        type: string
        required: true
      kernel_private:
        description: "Private source (needs PRIVATE_REPO_TOKEN secret)"
        type: boolean
        default: false

      # ── Device / Defconfig ─────────────────────────────────
      defconfig:
        description: "Defconfig (relative to arch/arm64/configs/)"
        type: string
        default: "rtwo_defconfig"

      # ── KernelSU ───────────────────────────────────────────
      ksu_variant:
        description: "KernelSU variant"
        type: choice
        options:
          - SukiSU
          - ReSukiSU
          - KernelSU-Next
          - WKSU
          - Tiann
          - None
        default: SukiSU

      # ── SUSFS / NoMount mode ───────────────────────────────
      # SUSFS_only    → standard ShirkNeko SUSFS patch (50_ + 10_)
      # NoMount_SUSFS → maxsteeel combined nomount-susfs-5.15.patch
      #                 (zero mount table entries + SUSFS hiding; beta)
      # None          → no SUSFS/NoMount patching
      susfs_mode:
        description: "SUSFS mode"
        type: choice
        options:
          - SUSFS_only
          - NoMount_SUSFS
          - None
        default: SUSFS_only
      susfs_branch:
        description: "SUSFS branch override for SUSFS_only mode (auto-detect if blank)"
        type: string
        default: "gki-android13-5.15"
      susfs_module:
        description: "Bundle SUSFS module into ZIP"
        type: choice
        options:
          - Release
          - CI
          - None
        default: Release

      # ── KPM ───────────────────────────────────────────────
      add_kpm:
        description: "Add KPM support + patch_linux Image patching"
        type: boolean
        default: false

      # ── KSU APK ───────────────────────────────────────────
      bundle_ksu_apk:
        description: "Bundle KernelSU Manager APK into ZIP"
        type: boolean
        default: true
      ksu_apk_variant:
        description: "KSU APK style (only applies to SukiSU variant)"
        type: choice
        options:
          - Manager
          - Spoofed-Manager
        default: Manager

      # ── Zeromount ─────────────────────────────────────────
      bundle_zeromount:
        description: "Bundle zeromount module into ZIP (requires KSU)"
        type: boolean
        default: true

      # ── Network Config ────────────────────────────────────
      enable_bbr:
        description: "Enable BBR + ECN congestion control"
        type: boolean
        default: true

      # ── Toolchain ─────────────────────────────────────────
      clang_compiler:
        description: "Clang toolchain"
        type: choice
        options:
          - ZyC Clang
          - Greenforce Clang
          - WeebX Clang
          - SuperRyzen Clang
          - System Clang
        default: ZyC Clang

      # ── Build Options ─────────────────────────────────────
      lto_mode:
        description: "LTO mode"
        type: choice
        options:
          - thin
          - full
          - none
        default: thin
      kernel_image_name:
        description: "Output image (Image / Image.gz / Image.lz4)"
        type: string
        default: "Image"
      extra_make_args:
        description: "Extra make arguments"
        type: string
        default: ""
      local_version:
        description: "Custom localversion (e.g. -rtwo-ultra)"
        type: string
        default: ""

      # ── AnyKernel3 ────────────────────────────────────────
      anykernel_branch:
        description: "AnyKernel3 branch"
        type: string
        default: "gki-2.0"

jobs:
  build:
    name: "[${{ inputs.susfs_mode }}] [${{ inputs.ksu_variant }}] [${{ inputs.clang_compiler }}]"
    runs-on: ubuntu-latest
    timeout-minutes: 150

    env:
      DEVICE:   rtwo
      KMI:      android13-5.15
      OUT_DIR:  out
      # Opt into Node.js 24 for all JS actions (avoids deprecation warnings)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

    # ── 1. Free disk space ──────────────────────────────────
    - name: Free Disk Space
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: true
        remove_packages: >-
          azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable
          firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*
        remove_packages_one_command: true
        remove_folders: >-
          /usr/share/swift /usr/share/miniconda /usr/share/az*
          /usr/local/lib/node_modules /usr/local/share/chromium
          /usr/local/share/powershell /usr/local/julia
          /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle
        rm_cmd: rmz
        rmz_version: "3.1.1"
        testing: false

    # ── 2. Swap ─────────────────────────────────────────────
    - name: Set Swap to 20G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 20

    - name: Tune Swap Aggressiveness
      run: |
        echo "vm.swappiness=100" | sudo tee -a /etc/sysctl.conf
        sudo sysctl -p

    # ── 3. Base packages ────────────────────────────────────
    - name: Install Build Prerequisites
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          build-essential bc curl flex cpio ccache rsync git zip \
          dwarves libelf-dev libssl-dev libfl-dev zstd wget \
          python3 python-is-python3 jq \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
          clang lld llvm llvm-dev bison kmod gh

    # ── 4. Custom Clang toolchain ────────────────────────────
    - name: Fetch Clang Toolchain
      if: inputs.clang_compiler != 'System Clang'
      run: |
        set -e

        get_latest_github_release() {
          local repo_url="$1"
          latest_url=$(curl -sL "https://api.github.com/repos/$repo_url/releases/latest" \
            | grep "browser_download_url.*tar.gz" | cut -d '"' -f 4 | head -n 1)
          [ -z "$latest_url" ] && { echo "❌ Failed to fetch release from $repo_url"; exit 1; }
          printf "%s" "$latest_url"
        }

        case "${{ inputs.clang_compiler }}" in
          "ZyC Clang")        clang_url=$(get_latest_github_release "ZyCromerZ/Clang") ;;
          "Greenforce Clang") clang_url=$(get_latest_github_release "greenforce-project/greenforce_clang") ;;
          "WeebX Clang")      clang_url=$(get_latest_github_release "XSans0/WeebX-Clang") ;;
          "SuperRyzen Clang") clang_url="https://gitlab.com/TianWalkzzMiku/SuperRyzen-Clang/" ;;
          *) echo "❌ Unsupported compiler: ${{ inputs.clang_compiler }}"; exit 1 ;;
        esac

        echo "✅ Clang source: $clang_url"
        mkdir -p clang

        if [[ "$clang_url" == *.tar.gz ]]; then
          wget --progress=bar:force -O clang/clang.tar.gz "$clang_url"
          tar -xf clang/clang.tar.gz -C clang
          rm -f clang/clang.tar.gz
        else
          git clone --recursive --depth=1 "$clang_url" clang
        fi

        if [ -d "clang/bin" ]; then
          CLANG_PATH="$GITHUB_WORKSPACE/clang/bin"
        else
          CLANG_PATH=$(find clang -type d -name "bin" | head -n 1)
          CLANG_PATH="$GITHUB_WORKSPACE/${CLANG_PATH}"
        fi

        [ ! -f "$CLANG_PATH/clang" ] && { echo "❌ clang binary not found in $CLANG_PATH"; ls -R clang; exit 1; }
        echo "✅ Using Clang from $CLANG_PATH"
        echo "CLANG_PATH=$CLANG_PATH" >> "$GITHUB_ENV"
        echo "$CLANG_PATH" >> "$GITHUB_PATH"
        clang --version

    # ── 5. Configure ccache ──────────────────────────────────
    - name: Configure ccache
      run: |
        echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"
        echo "CCACHE_NOCOMPRESS=true" >> "$GITHUB_ENV"
        echo "CCACHE_MAXSIZE=10G" >> "$GITHUB_ENV"
        echo "CCACHE_CPP2=yes" >> "$GITHUB_ENV"

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-rtwo-${{ inputs.ksu_variant }}-${{ inputs.clang_compiler }}-${{ github.sha }}
        restore-keys: ccache-rtwo-${{ inputs.ksu_variant }}-${{ inputs.clang_compiler }}-

    # ── 6. Clone kernel source ──────────────────────────────
    - name: Clone Kernel Source
      env:
        REPO:    ${{ inputs.kernel_repo }}
        BRANCH:  ${{ inputs.kernel_branch }}
        PRIVATE: ${{ inputs.kernel_private }}
      run: |
        set -e
        if [ "$PRIVATE" == "true" ]; then
          if [[ "$REPO" == *"github.com"* ]]; then
            OWNER=$(echo "${REPO#https://github.com/}" | cut -d'/' -f1)
            AUTH_URL="https://${OWNER}:${{ secrets.PRIVATE_REPO_TOKEN }}@${REPO#https://}"
          elif [[ "$REPO" == *"gitlab.com"* ]]; then
            OWNER=$(echo "${REPO#https://gitlab.com/}" | cut -d'/' -f1)
            AUTH_URL="https://${OWNER}:${{ secrets.PRIVATE_REPO_TOKEN }}@${REPO#https://}"
          else
            echo "❌ Unsupported private host"; exit 1
          fi
          git clone --depth=1 --branch "$BRANCH" "$AUTH_URL" kernel_source
        else
          git clone --depth=1 --branch "$BRANCH" "$REPO" kernel_source
        fi

    # ── 7. Detect kernel version ────────────────────────────
    - name: Detect Kernel Version
      run: |
        cd kernel_source
        VERSION=$(grep '^VERSION = ' Makefile | awk '{print $3}')
        PATCHLEVEL=$(grep '^PATCHLEVEL = ' Makefile | awk '{print $3}')
        SUBLEVEL=$(grep '^SUBLEVEL = ' Makefile | awk '{print $3}')
        [ -z "$VERSION" ] || [ -z "$PATCHLEVEL" ] && { echo "::error::Cannot parse kernel version"; exit 1; }

        KERNEL_VER="${VERSION}.${PATCHLEVEL}"
        SUB="${SUBLEVEL:-0}"
        BUILD_TIME=$(date +'%Y%m%d-%H%M')

        {
          echo "KERNEL_VER=$KERNEL_VER"
          echo "SUBLEVEL=$SUB"
          echo "FULL_VERSION=${KERNEL_VER}.${SUB}"
          echo "FILE_NAME=rtwo-${KERNEL_VER}.${SUB}-${{ inputs.ksu_variant }}"
          echo "BUILD_TIME=$BUILD_TIME"
        } >> "$GITHUB_ENV"
        echo "Detected kernel ${KERNEL_VER}.${SUB}"

    # ── 8. Apply localversion ───────────────────────────────
    - name: Set Localversion
      if: inputs.local_version != ''
      working-directory: kernel_source
      run: |
        DEFCONFIG="arch/arm64/configs/${{ inputs.defconfig }}"
        echo "CONFIG_LOCALVERSION=\"${{ inputs.local_version }}\"" >> "$DEFCONFIG"

    # ── 9. Remove -dirty suffix ─────────────────────────────
    - name: Remove Dirty Suffix
      working-directory: kernel_source
      run: |
        [ -f scripts/setlocalversion ] && \
          sed -i 's/ -dirty//g; s/printf.*-dirty.*//' scripts/setlocalversion || true

    # ── 10. Bypass ABI checks ───────────────────────────────
    - name: Bypass ABI Checks
      working-directory: kernel_source
      run: |
        touch abi_symbollist.raw 2>/dev/null || true
        sed -i 's/check_defconfig//' build.config.gki 2>/dev/null || true
        scripts/config --file "arch/arm64/configs/${{ inputs.defconfig }}" \
          -d TRIM_UNUSED_KSYMS 2>/dev/null || true

    # ── 11. Setup KernelSU ──────────────────────────────────
    - name: Setup KernelSU
      if: inputs.ksu_variant != 'None'
      working-directory: kernel_source
      env:
        KSU_VARIANT: ${{ inputs.ksu_variant }}
      run: |
        rm -rf KernelSU KernelSU-Next Wild_KSU drivers/kernelsu

        case "$KSU_VARIANT" in
          Tiann)
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
            echo "KSU_DIR=KernelSU" >> "$GITHUB_ENV" ;;
          SukiSU)
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
            echo "KSU_DIR=KernelSU" >> "$GITHUB_ENV" ;;
          ReSukiSU)
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash -s susfs-ksud
            echo "KSU_DIR=KernelSU" >> "$GITHUB_ENV" ;;
          KernelSU-Next)
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/stable/kernel/setup.sh" | bash -s stable
            echo "KSU_DIR=KernelSU-Next" >> "$GITHUB_ENV" ;;
          WKSU)
            curl -LSs "https://raw.githubusercontent.com/WildKernels/Wild_KSU/stable/kernel/setup.sh" | bash -s canary
            echo "KSU_DIR=Wild_KSU" >> "$GITHUB_ENV" ;;
        esac

    # ════════════════════════════════════════════════════════
    # SUSFS MODE: SUSFS_only
    # Standard path: ShirkNeko SUSFS (50_ kernel patch + 10_ KSU patch)
    # ════════════════════════════════════════════════════════

    - name: "[SUSFS_only] Resolve SUSFS Branch"
      if: inputs.susfs_mode == 'SUSFS_only' && inputs.ksu_variant != 'None'
      env:
        OVERRIDE: ${{ inputs.susfs_branch }}
      run: |
        SUSFS_REPO="https://github.com/ShirkNeko/susfs4ksu.git"
        if [ -n "$OVERRIDE" ]; then
          echo "SUSFS_BRANCH=$OVERRIDE" >> "$GITHUB_ENV"
          echo "Using override: $OVERRIDE"
          exit 0
        fi
        for AV in android16 android15 android14 android13 android12; do
          CANDIDATE="gki-${AV}-${KERNEL_VER}"
          if git ls-remote --heads "$SUSFS_REPO" "$CANDIDATE" 2>/dev/null | grep -q .; then
            echo "SUSFS_BRANCH=$CANDIDATE" >> "$GITHUB_ENV"
            echo "Auto-resolved: $CANDIDATE"
            exit 0
          fi
        done
        CANDIDATE="kernel-${KERNEL_VER}"
        if git ls-remote --heads "$SUSFS_REPO" "$CANDIDATE" 2>/dev/null | grep -q .; then
          echo "SUSFS_BRANCH=$CANDIDATE" >> "$GITHUB_ENV"
          echo "Auto-resolved: $CANDIDATE"
          exit 0
        fi
        echo "::error::No SUSFS branch found for kernel ${KERNEL_VER}. Set susfs_branch manually."
        exit 1

    - name: "[SUSFS_only] Clone SUSFS Patches"
      if: inputs.susfs_mode == 'SUSFS_only' && inputs.ksu_variant != 'None'
      run: |
        git clone --depth=1 --branch "$SUSFS_BRANCH" \
          https://github.com/ShirkNeko/susfs4ksu.git susfs_patches

    - name: "[SUSFS_only] Apply Upstream SUSFS Patch (50_)"
      if: inputs.susfs_mode == 'SUSFS_only' && inputs.ksu_variant != 'None'
      working-directory: kernel_source
      run: |
        PATCH=$(find "$GITHUB_WORKSPACE/susfs_patches/kernel_patches" \
          -maxdepth 1 -name '50_add_susfs_in_*.patch' | head -1)
        [ -z "$PATCH" ] && { echo "::error::50_ SUSFS patch not found"; exit 1; }
        echo "Applying: $(basename "$PATCH")"
        patch -p1 -F3 --no-backup-if-mismatch < "$PATCH" || true

    - name: "[SUSFS_only] Copy SUSFS Source Files"
      if: inputs.susfs_mode == 'SUSFS_only' && inputs.ksu_variant != 'None'
      working-directory: kernel_source
      run: |
        mkdir -p fs include/linux
        cp -r "$GITHUB_WORKSPACE/susfs_patches/kernel_patches/fs/"* fs/ 2>/dev/null || true
        cp -r "$GITHUB_WORKSPACE/susfs_patches/kernel_patches/include/linux/"* include/linux/ 2>/dev/null || true

    - name: "[SUSFS_only] Apply KSU-side SUSFS Patch (10_)"
      if: inputs.susfs_mode == 'SUSFS_only' && inputs.ksu_variant != 'None'
      run: |
        cd "kernel_source/$KSU_DIR"
        if grep -rq 'config KSU_SUSFS' kernel/Kconfig 2>/dev/null; then
          echo "SUSFS already integrated — skipping 10_ patch"
          exit 0
        fi
        KSU_PATCH=$(find "$GITHUB_WORKSPACE/susfs_patches/kernel_patches/KernelSU" \
          -name '10_enable_susfs_for_ksu.patch' 2>/dev/null | head -1)
        [ -z "$KSU_PATCH" ] && { echo "::warning::No 10_ KSU patch found, skipping"; exit 0; }
        patch -p1 -F3 --no-backup-if-mismatch < "$KSU_PATCH" || \
          echo "::warning::10_ patch soft-failed"

    # ════════════════════════════════════════════════════════
    # SUSFS MODE: NoMount_SUSFS
    # Uses maxsteeel/nomount combined patch for kernel 5.15.
    # Replaces ALL standard SUSFS steps — zero mount table entries.
    # ════════════════════════════════════════════════════════

    - name: "[NoMount_SUSFS] Clone NoMount Repo"
      if: inputs.susfs_mode == 'NoMount_SUSFS' && inputs.ksu_variant != 'None'
      run: |
        git clone --depth=1 https://github.com/maxsteeel/nomount.git nomount_repo
        PATCH="nomount_repo/patches/nomount-susfs-kernel-5.15.patch"
        [ -f "$PATCH" ] && echo "✅ Found: $PATCH" || \
          { echo "::error::nomount-susfs-kernel-5.15.patch not found"; exit 1; }

    - name: "[NoMount_SUSFS] Apply Combined NoMount+SUSFS Patch"
      if: inputs.susfs_mode == 'NoMount_SUSFS' && inputs.ksu_variant != 'None'
      working-directory: kernel_source
      run: |
        PATCH="$GITHUB_WORKSPACE/nomount_repo/patches/nomount-susfs-kernel-5.15.patch"
        echo "🔩 Applying nomount-susfs-kernel-5.15.patch (fuzz=10)..."
        patch -p1 --fuzz=10 --no-backup-if-mismatch < "$PATCH" || \
          echo "::warning::Patch applied with warnings — check .rej files"
        echo "NOMOUNT_APPLIED=true" >> "$GITHUB_ENV"
        echo "✅ NoMount+SUSFS patch applied"

    # ════════════════════════════════════════════════════════
    # DEFCONFIG — runs after whichever patch mode was chosen
    # ════════════════════════════════════════════════════════

    - name: Configure Defconfig
      working-directory: kernel_source
      env:
        SUSFS_MODE:     ${{ inputs.susfs_mode }}
        ADD_KPM:        ${{ inputs.add_kpm }}
        ENABLE_BBR:     ${{ inputs.enable_bbr }}
        KSU_VARIANT:    ${{ inputs.ksu_variant }}
        DEFCONFIG_NAME: ${{ inputs.defconfig }}
      run: |
        DEFCONFIG_PATH="arch/arm64/configs/${DEFCONFIG_NAME}"
        [ ! -f "$DEFCONFIG_PATH" ] && { echo "::error::Defconfig not found: $DEFCONFIG_PATH"; exit 1; }

        # ── KSU core ──
        if [ "$KSU_VARIANT" != "None" ]; then
          cat >> "$DEFCONFIG_PATH" <<'KCONFIG'
        CONFIG_KSU=y
        CONFIG_KALLSYMS=y
        CONFIG_KALLSYMS_ALL=y
        KCONFIG
        fi

        # ── KPM ──
        [ "$ADD_KPM" = "true" ] && echo "CONFIG_KPM=y" >> "$DEFCONFIG_PATH"

        # ── SUSFS configs (shared by both SUSFS modes) ──
        if [ "$SUSFS_MODE" != "None" ] && [ "$KSU_VARIANT" != "None" ]; then
          cat >> "$DEFCONFIG_PATH" <<'KCONFIG'
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
        CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_SUS_SU=y
        CONFIG_KSU_SUSFS_HIDDEN_NAME=y
        CONFIG_KSU_SUSFS_HARDENED=y
        KCONFIG
        fi

        # ── NoMount VFS subsystem ──
        if [ "$SUSFS_MODE" = "NoMount_SUSFS" ] && [ "$KSU_VARIANT" != "None" ]; then
          echo "CONFIG_NOMOUNT=y" >> "$DEFCONFIG_PATH"
          echo "✅ CONFIG_NOMOUNT=y added"
        fi

        # ── TMPFS ──
        cat >> "$DEFCONFIG_PATH" <<'KCONFIG'
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        KCONFIG

        # ── BBR + ECN ──
        if [ "$ENABLE_BBR" = "true" ]; then
          cat >> "$DEFCONFIG_PATH" <<'KCONFIG'
        CONFIG_TCP_CONG_ADVANCED=y
        CONFIG_TCP_CONG_BBR=y
        CONFIG_NET_SCH_FQ=y
        CONFIG_TCP_CONG_BIC=n
        CONFIG_TCP_CONG_WESTWOOD=n
        CONFIG_TCP_CONG_HTCP=n
        CONFIG_IP_ECN=y
        CONFIG_TCP_ECN=y
        CONFIG_IPV6_ECN=y
        KCONFIG
        fi

        # ── Prune unsupported CONFIG_KSU_ entries ──
        while IFS='=' read -r cfg _; do
          symbol="${cfg#CONFIG_}"
          grep -Rqx "config ${symbol}" . --include='Kconfig*' 2>/dev/null && continue
          sed -i "/^${cfg}=/d" "$DEFCONFIG_PATH"
        done < <(grep '^CONFIG_KSU_' "$DEFCONFIG_PATH" 2>/dev/null || true)

        if ! grep -q '^CONFIG_KSU_SUSFS=' "$DEFCONFIG_PATH" 2>/dev/null; then
          sed -i '/^CONFIG_KSU_SUSFS_/d' "$DEFCONFIG_PATH"
        fi

    # ── Build kernel ────────────────────────────────────────
    - name: Build Kernel
      working-directory: kernel_source
      env:
        LTO_MODE:       ${{ inputs.lto_mode }}
        EXTRA_ARGS:     ${{ inputs.extra_make_args }}
        DEFCONFIG_NAME: ${{ inputs.defconfig }}
      run: |
        ccache -z

        LTO_FLAG=""
        [ "$LTO_MODE" != "none" ] && LTO_FLAG="LTO=$LTO_MODE"

        WARN_FLAGS="-Wno-error -Wno-implicit-int -Wno-strict-prototypes -Wno-implicit-function-declaration"

        MAKE_ARGS="O=$OUT_DIR ARCH=arm64 LLVM=1 LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          $LTO_FLAG $EXTRA_ARGS \
          CC='ccache clang' \
          AR=llvm-ar AS=llvm-as NM=llvm-nm \
          OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
          KBUILD_BUILD_USER=rtwo-builder \
          KBUILD_BUILD_HOST=github-actions"

        eval make $MAKE_ARGS KCFLAGS="$WARN_FLAGS" "$DEFCONFIG_NAME"
        eval make $MAKE_ARGS KCFLAGS="$WARN_FLAGS" -j$(nproc --all)

        ccache -s

    # ── Save ccache ─────────────────────────────────────────
    - name: Save ccache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-rtwo-${{ inputs.ksu_variant }}-${{ inputs.clang_compiler }}-${{ github.sha }}

    # ── KPM – patch_linux binary patching ───────────────────
    - name: Apply KPM patch_linux to Image
      if: inputs.add_kpm
      run: |
        IMAGE_PATH="kernel_source/$OUT_DIR/arch/arm64/boot/${{ inputs.kernel_image_name }}"
        [ ! -f "$IMAGE_PATH" ] && { echo "::error::Image not found for KPM patching"; exit 1; }

        git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git kpm_patch
        PATCH_BIN="kpm_patch/kpm/patch_linux"

        if [ -f "$PATCH_BIN" ]; then
          chmod +x "$PATCH_BIN"
          cd "$(dirname "$IMAGE_PATH")"
          "$GITHUB_WORKSPACE/$PATCH_BIN"
          [ -f oImage ] && mv oImage "${{ inputs.kernel_image_name }}" && \
            echo "✅ KPM patch_linux applied" || \
            echo "::warning::patch_linux did not produce oImage, using original"
        else
          echo "::warning::patch_linux binary not found, skipping"
        fi

    # ── Pack AnyKernel3 ──────────────────────────────────────
    - name: Prepare AnyKernel3
      env:
        IMAGE_NAME: ${{ inputs.kernel_image_name }}
      run: |
        IMAGE_PATH="kernel_source/$OUT_DIR/arch/arm64/boot/${IMAGE_NAME}"
        if [ ! -f "$IMAGE_PATH" ]; then
          echo "::error::Kernel image not found at $IMAGE_PATH"
          ls -la "kernel_source/$OUT_DIR/arch/arm64/boot/" 2>/dev/null || true
          exit 1
        fi

        git clone --depth=1 --branch "${{ inputs.anykernel_branch }}" \
          https://github.com/WildKernels/AnyKernel3.git AnyKernel3
        rm -rf AnyKernel3/.git

        cp "$IMAGE_PATH" AnyKernel3/
        mkdir -p AnyKernel3/dtbs
        find "kernel_source/$OUT_DIR/arch/arm64/boot/dts" \
          -name "*.dtb" -exec cp {} AnyKernel3/dtbs/ \; 2>/dev/null || true

    # ── Bundle SUSFS module (Release) ────────────────────────
    - name: Download SUSFS Module (Release)
      if: inputs.susfs_module == 'Release' && inputs.susfs_mode != 'None' && inputs.ksu_variant != 'None'
      continue-on-error: true
      run: |
        wget -q -O ksu_module_susfs.zip \
          https://github.com/sidex15/ksu_module_susfs/releases/latest/download/ksu_module_susfs_1.5.2+.zip
        [ -f ksu_module_susfs.zip ] && cp ksu_module_susfs.zip AnyKernel3/ && \
          echo "✅ SUSFS module (Release) added" || echo "::warning::SUSFS Release download failed"

    # ── Bundle SUSFS module (CI) ─────────────────────────────
    - name: Download SUSFS Module (CI)
      if: inputs.susfs_module == 'CI' && inputs.susfs_mode != 'None' && inputs.ksu_variant != 'None'
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        LATEST_RUN_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs?status=success" | \
          jq -r '.workflow_runs[] | select(.head_branch == "v1.5.2+") | .id' | head -n 1)
        [ -z "$LATEST_RUN_ID" ] && { echo "::warning::No SUSFS CI run found"; exit 0; }
        ARTIFACT_URL=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
          "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$LATEST_RUN_ID/artifacts" | \
          jq -r '.artifacts[0].archive_download_url')
        [ -n "$ARTIFACT_URL" ] && \
          curl -fL -H "Authorization: Bearer $GITHUB_TOKEN" -o ksu_module_susfs_CI.zip "$ARTIFACT_URL" && \
          cp ksu_module_susfs_CI.zip AnyKernel3/ && echo "✅ SUSFS module (CI) added" || \
          echo "::warning::SUSFS CI artifact fetch failed"

    # ── Bundle KernelSU Manager APK ─────────────────────────
    - name: Download KernelSU Manager APK
      if: inputs.bundle_ksu_apk && inputs.ksu_variant != 'None'
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        KSU_VARIANT:  ${{ inputs.ksu_variant }}
        APK_ARTIFACT: ${{ inputs.ksu_apk_variant }}
      run: |
        download_sukisu_apk() {
          local branch="$1" artifact="$2"
          run_id=$(gh api \
            "repos/SukiSU-Ultra/SukiSU-Ultra/actions/workflows/build-manager.yml/runs?branch=${branch}&status=success&per_page=1" \
            --jq '.workflow_runs[0].id' 2>/dev/null || echo "")
          [ -z "$run_id" ] && { echo "::warning::No SukiSU build on $branch"; return 1; }
          artifact_url=$(gh api "repos/SukiSU-Ultra/SukiSU-Ultra/actions/runs/$run_id/artifacts" | \
            jq -r ".artifacts[] | select(.name == \"$artifact\") | .archive_download_url" | head -n1)
          [ -z "$artifact_url" ] && { echo "::warning::Artifact '$artifact' not found"; return 1; }
          curl -fL -H "Authorization: token $GITHUB_TOKEN" -o KSU_Manager.zip "$artifact_url"
          unzip -j KSU_Manager.zip "*.apk" -d AnyKernel3/ && echo "✅ SukiSU APK ($artifact) added"
        }

        case "$KSU_VARIANT" in
          SukiSU)        download_sukisu_apk "main" "$APK_ARTIFACT" ;;
          ReSukiSU)      download_sukisu_apk "main" "Manager" ;;
          Tiann)
            APK_URL=$(curl -sL "https://api.github.com/repos/tiann/KernelSU/releases/latest" | \
              jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n1)
            [ -n "$APK_URL" ] && wget -q -O AnyKernel3/KernelSU.apk "$APK_URL" && \
              echo "✅ Tiann APK added" || echo "::warning::Tiann APK not found" ;;
          KernelSU-Next)
            APK_URL=$(curl -sL "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest" | \
              jq -r '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' | head -n1)
            [ -n "$APK_URL" ] && wget -q -O AnyKernel3/KernelSU-Next.apk "$APK_URL" && \
              echo "✅ KernelSU-Next APK added" || echo "::warning::KernelSU-Next APK not found" ;;
          WKSU) echo "::warning::No automated APK for WKSU, skipping" ;;
        esac

    # ── Bundle Zeromount module ──────────────────────────────
    - name: Download Zeromount Module
      if: inputs.bundle_zeromount && inputs.ksu_variant != 'None'
      continue-on-error: true
      run: |
        DOWNLOAD_URL=$(curl -sL "https://api.github.com/repos/Enginex0/zeromount/releases/latest" | \
          jq -r '.assets[] | select(.name | test("zeromount-.*\\.zip$")) | select(.name | contains("debug") | not) | .browser_download_url' | head -n1)
        [ -z "$DOWNLOAD_URL" ] && \
          DOWNLOAD_URL=$(curl -sL "https://api.github.com/repos/Enginex0/zeromount/releases/latest" | \
          jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -n1)
        [ -z "$DOWNLOAD_URL" ] && { echo "::warning::Zeromount ZIP not found, skipping"; exit 0; }

        TAG=$(curl -sL "https://api.github.com/repos/Enginex0/zeromount/releases/latest" | jq -r '.tag_name')
        wget -q -O "zeromount-${TAG}.zip" "$DOWNLOAD_URL"
        [ -f "zeromount-${TAG}.zip" ] && cp "zeromount-${TAG}.zip" AnyKernel3/ && \
          echo "✅ Zeromount $TAG added" && echo "ZEROMOUNT_TAG=$TAG" >> "$GITHUB_ENV" || \
          echo "::warning::Zeromount download failed"

    # ── Scan patch rejects ───────────────────────────────────
    - name: Scan Patch Rejects
      if: always()
      run: |
        REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
        mkdir -p "$REJECTS_DIR"
        mapfile -t REJS < <(find kernel_source -type f -name '*.rej')
        REJ_COUNT=${#REJS[@]}
        echo "REJ_COUNT=$REJ_COUNT" >> "$GITHUB_ENV"
        if [ "$REJ_COUNT" -gt 0 ]; then
          echo "::warning::$REJ_COUNT patch reject(s) found!"
          for REJ in "${REJS[@]}"; do
            REL="${REJ#kernel_source/}"
            DEST="$REJECTS_DIR/$REL"
            mkdir -p "$(dirname "$DEST")"
            cp "$REJ" "$DEST"
            ORIG="${REJ%.rej}"
            [ -f "$ORIG" ] && cp "$ORIG" "$REJECTS_DIR/${REL%.rej}"
          done
        fi

    # ── Upload AnyKernel3 ZIP ────────────────────────────────
    - name: Upload AnyKernel3
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.FILE_NAME }}-${{ inputs.susfs_mode }}-${{ env.BUILD_TIME }}-AnyKernel3
        path: ./AnyKernel3/**
        if-no-files-found: error
        compression-level: 9
        retention-days: 30

    # ── Upload patch rejects ─────────────────────────────────
    - name: Upload Patch Rejects
      if: always() && env.REJ_COUNT > 0
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.FILE_NAME }}-Rejects
        path: patch-rejects/
        if-no-files-found: ignore
        compression-level: 9

    # ── Job Summary ──────────────────────────────────────────
    - name: Job Summary
      if: always()
      env:
        SUSFS_MODE:       ${{ inputs.susfs_mode }}
        ADD_KPM:          ${{ inputs.add_kpm }}
        ENABLE_BBR:       ${{ inputs.enable_bbr }}
        SUSFS_MODULE:     ${{ inputs.susfs_module }}
        BUNDLE_APK:       ${{ inputs.bundle_ksu_apk }}
        BUNDLE_ZEROMOUNT: ${{ inputs.bundle_zeromount }}
        KSU_VARIANT:      ${{ inputs.ksu_variant }}
        CLANG:            ${{ inputs.clang_compiler }}
        LTO:              ${{ inputs.lto_mode }}
        REPO:             ${{ inputs.kernel_repo }}
        BRANCH:           ${{ inputs.kernel_branch }}
        IMAGE:            ${{ inputs.kernel_image_name }}
      run: |
        S() { [[ "$1" == "true" ]] && echo "✅ Enabled" || echo "❌ Disabled"; }
        MODE_LABEL=""
        case "$SUSFS_MODE" in
          SUSFS_only)    MODE_LABEL="✅ Standard SUSFS (ShirkNeko)" ;;
          NoMount_SUSFS) MODE_LABEL="🔩 NoMount+SUSFS (maxsteeel) — VFS injection, zero mounts" ;;
          None)          MODE_LABEL="❌ Disabled" ;;
        esac
        {
          echo "## 🏗️ Universal Kernel Build — rtwo (android13-5.15)"
          echo ""
          echo "| Property | Value |"
          echo "|----------|-------|"
          echo "| **Device** | rtwo |"
          echo "| **KMI** | android13-5.15 |"
          echo "| **Source** | ${REPO} |"
          echo "| **Branch** | ${BRANCH} |"
          echo "| **Kernel** | ${FULL_VERSION} |"
          echo "| **KSU Variant** | ${KSU_VARIANT} |"
          echo "| **SUSFS Mode** | ${MODE_LABEL} |"
          echo "| **SUSFS Branch** | ${SUSFS_BRANCH:-N/A} |"
          echo "| **SUSFS Module** | ${SUSFS_MODULE} |"
          echo "| **KSU APK** | $(S "$BUNDLE_APK") |"
          echo "| **Zeromount** | $(S "$BUNDLE_ZEROMOUNT") ${ZEROMOUNT_TAG:-} |"
          echo "| **KPM** | $(S "$ADD_KPM") |"
          echo "| **BBR + ECN** | $(S "$ENABLE_BBR") |"
          echo "| **Clang** | ${CLANG} |"
          echo "| **LTO** | ${LTO} |"
          echo "| **Image** | ${IMAGE} |"
          echo "| **Patch Rejects** | ${REJ_COUNT:-0} |"
          echo "| **Artifact** | ${FILE_NAME:-N/A} |"
          echo "| **Build Time** | ${BUILD_TIME} |"
        } >> "$GITHUB_STEP_SUMMARY"
