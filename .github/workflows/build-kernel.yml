name: Build Custom Android Kernel
on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: 'Kernel Source URL'
        required: true
        default: 'https://github.com/someone/kernel_source'
      KERNEL_BRANCH:
        description: 'Kernel Branch'
        required: true
        default: 'android13-5.15'
      DEFCONFIG:
        description: 'Defconfig File Name'
        required: true
        default: 'vendor/my_defconfig'
      ANYKERNEL3_URL:
        description: 'AnyKernel3 Repository URL'
        required: true
        default: 'https://github.com/osm0sis/AnyKernel3'
      USE_KSU:
        description: 'Include KernelSU'
        required: true
        type: boolean
        default: true
      USE_SUSFS:
        description: 'Include susfs4ksu (for 5.15)'
        required: true
        type: boolean
        default: true
      USE_KPM:
        description: 'Include Kernel Patch Manager (kpm)'
        required: true
        type: boolean
        default: true
      USE_SUKISU:
        description: 'Include sukisu-ultra'
        required: true
        type: boolean
        default: false
      APPLY_NOMOUNT:
        description: 'Apply nomount patch'
        required: true
        type: boolean
        default: true
      APPLY_ZRAM:
        description: 'Optimize zRAM'
        required: true
        type: boolean
        default: true
      APPLY_BBR:
        description: 'Enable BBR congestion control'
        required: true
        type: boolean
        default: true
      APPLY_VFS:
        description: 'Optimize VFS cache'
        required: true
        type: boolean
        default: true
      APPLY_LTO_THIN:
        description: 'Enable LTO Thin'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Builder Repo
      uses: actions/checkout@v4
      
    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 python-is-python3
        
    - name: Setup Toolchain (ZyC Clang)
      run: |
        mkdir -p $GITHUB_WORKSPACE/toolchains/zyc-clang
        cd $GITHUB_WORKSPACE/toolchains/zyc-clang
        DOWNLOAD_URL=$(curl -sL https://api.github.com/repos/ZyCromerZ/Clang/releases/latest | jq -r '.assets[0].browser_download_url')
        wget -qO zyc.tar.gz "$DOWNLOAD_URL"
        tar -xf zyc.tar.gz -C . --strip-components=1 || tar -xf zyc.tar.gz -C .
        rm zyc.tar.gz
        
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 --branch ${{ github.event.inputs.KERNEL_BRANCH }} ${{ github.event.inputs.KERNEL_SOURCE }} $GITHUB_WORKSPACE/kernel
        
    - name: Apply Patches
      run: |
        cd $GITHUB_WORKSPACE/kernel
        chmod +x $GITHUB_WORKSPACE/scripts/patch-scripts.sh
        $GITHUB_WORKSPACE/scripts/patch-scripts.sh
      env:
        USE_KSU: ${{ github.event.inputs.USE_KSU }}
        USE_SUSFS: ${{ github.event.inputs.USE_SUSFS }}
        USE_KPM: ${{ github.event.inputs.USE_KPM }}
        USE_SUKISU: ${{ github.event.inputs.USE_SUKISU }}
        APPLY_NOMOUNT: ${{ github.event.inputs.APPLY_NOMOUNT }}
        APPLY_ZRAM: ${{ github.event.inputs.APPLY_ZRAM }}
        APPLY_BBR: ${{ github.event.inputs.APPLY_BBR }}
        APPLY_VFS: ${{ github.event.inputs.APPLY_VFS }}
        APPLY_LTO_THIN: ${{ github.event.inputs.APPLY_LTO_THIN }}
        
    - name: Compile Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel
        export PATH=$GITHUB_WORKSPACE/toolchains/zyc-clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        
        make O=out ${{ github.event.inputs.DEFCONFIG }}
        make -j$(nproc --all) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      LD=ld.lld \
                      AR=llvm-ar \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip \
                      Image.lz4 
                      
    - name: Package with AnyKernel3
      if: success()
      run: |
        git clone --depth=1 ${{ github.event.inputs.ANYKERNEL3_URL }} $GITHUB_WORKSPACE/AnyKernel3
        cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.lz4 $GITHUB_WORKSPACE/AnyKernel3/ || true
        cd $GITHUB_WORKSPACE/AnyKernel3
        zip -r9 AnyKernel3-Kernel.zip * -x .git README.md *placeholder
        
    - name: Upload AnyKernel3 Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: AnyKernel3-Kernel-Zip
        path: ${{ github.workspace }}/AnyKernel3/AnyKernel3-Kernel.zip
        
    - name: Upload Image.lz4 Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Image-lz4
        path: ${{ github.workspace }}/kernel/out/arch/arm64/boot/Image.lz4
